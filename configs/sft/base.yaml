extends: ../data/amazon23-industrial.yaml

implementation_target: official_source
cutoff_len: 512
learning_rate: 3.0e-4
lr_scheduler_type: cosine
optimizer: adamw_torch
warmup_steps: 100
weight_decay: 0.0
batch_size: 1024
micro_batch_size: 2
auto_adapt_batch: true
num_train_epochs: 10
max_steps: null
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
early_stopping: true
early_stopping_patience:
  official_source: 3
  paper_aligned: 1
seed: 42
data_seed: 42
eval_steps: 0.1
logging_steps: 10
gradient_checkpointing: true
precision:
  preferred: bf16
  fallback_for_v100: fp32
output_dir: checkpoints/sft_0.5b_official_Industrial
artifacts_dir: artifacts

model_name_or_path: data/models/Qwen2.5-0.5B-Instruct
diagnostic_model_name_or_path: data/models/Qwen2.5-0.5B
model_variant: qwen2.5-0.5b-base-diagnostic
full_finetuning: true
freeze_llm: false
use_lora: false
add_all_codebook_tokens: false
