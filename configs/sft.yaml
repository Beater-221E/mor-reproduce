# Full-parameter SFT defaults (4x V100-16GB)
seed: 42
max_epochs: 10
learning_rate: 3.0e-4
warmup_steps: 20
weight_decay: 0.01
max_grad_norm: 1.0
cutoff_len: 512
global_batch_size: 1024
eval_every_epochs: 0.5
# 0 = disable early stopping (run full max_epochs).
early_stop_patience: 0
fp16: true
gradient_checkpointing: true

# per-device micro batch by model size (larger micro => fewer accum, higher GPU util)
# keep global_batch_size = micro * n_gpu * accum ≈ 1024
micro_batch_size:
  "0.5B": 8
  "1.5B": 2   # packing fills seq to 512; 2 is safer on 16GB V100
  "3B": 1

# throughput
dataloader_num_workers: 0  # avoid fork+CUDA hangs on this host
token_cache: true
pack_sequences: true   # ~3x fewer steps/epoch (mean seq ~134 -> pack into 512)
log_every_micro: 0     # 0 = off (avoid 4-rank spam)
logging_steps: 1     # print loss every optimizer step (step is already ~2min)

# Paths are relative to project root (or absolute if you prefer).
# Paper backbone: Qwen2.5-Instruct (1.5B Instruct for this run).
model_map:
  "0.5B": data/models/Qwen2.5-0.5B
  "1.5B": data/models/Qwen2.5-1.5B-Instruct
  "3B": data/models/Qwen2.5-3B

# local model root under the project tree
model_root: data/models