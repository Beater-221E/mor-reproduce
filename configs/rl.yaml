# Full-parameter GRPO defaults (4x V100-16GB)
seed: 42
num_train_epochs: 2
learning_rate: 1.0e-5
warmup_ratio: 0.03
beta: 0.001
max_grad_norm: 0.3
max_completion_length: 128
temperature: 1.0
num_generations: 16  # fall back to 8 only if OOM (still full-param)
per_device_train_batch_size: 1
global_batch_size: 512
reward_type: ranking  # rule + rank
beam_search: true
fp16: true
gradient_checkpointing: true
sync_ref_model: true